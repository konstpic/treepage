apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "treepage-frontend.fullname" . }}-config
  labels:
    {{- include "treepage-frontend.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "apiUrl": "{{ include "treepage-frontend.apiUrl" . }}",
      "authUrl": "{{ include "treepage-frontend.authUrl" . }}"
    }
  default.conf: |
    server {
        listen {{ .Values.frontend.service.containerPort }};
        root /usr/share/nginx/html;
        index index.html;

        location = /config.json {
            alias /etc/treepage/config.json;
            default_type application/json;
            add_header Cache-Control "no-cache";
        }

        location = /readiness {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /liveness {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        {{- if .Values.frontend.proxy.enabled }}
        location /api/auth/ {
            proxy_pass http://{{ include "treepage-frontend.backendAuthService" . }}:{{ .Values.backend.authPort }}/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://{{ include "treepage-frontend.backendServerService" . }}:{{ .Values.backend.serverPort }}/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
        {{- end }}

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
