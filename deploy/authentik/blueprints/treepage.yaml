# Authentik blueprint: TreePage OAuth2/OIDC client (dev/test).
# Applied automatically when authentik-server starts (blueprints.goauthentik.io/instantiate).
---
version: 1
metadata:
  name: TreePage OIDC
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: treepage
    attrs:
      name: treepage
      client_type: confidential
      client_id: treepage
      client_secret: treepage-authentik-dev-secret
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      redirect_uris:
        - url: http://localhost:8080/api/auth/callback
          matching_mode: strict
        - url: http://127.0.0.1:8080/api/auth/callback
          matching_mode: strict
        - url: http://192.168.0.64:8090/api/auth/callback
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, treepage-roles]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, treepage-groups]]

  - model: authentik_core.application
    identifiers:
      slug: treepage
    attrs:
      name: TreePage
      slug: treepage
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, treepage]]
      launch_url: http://192.168.0.64:8090/
      open_in_new_tab: true
