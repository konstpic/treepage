# TreePage backend Helm values.
# Replaces the corporate uc/secret subcharts with native Kubernetes resources.
#
# Legacy mapping (uc chart → this chart):
#   global.registry_url          → global.imageRegistry
#   global.settings.relations.*  → global.frontendUrl / ingress.host
#   global.settings.db.*         → postgresql.*
#   secret.vault                 → secret.* (or secret.existingSecret)
#   auth / server / sync         → same top-level keys

global:
  imageRegistry: ""
  imagePullSecrets: []
  appVersion: latest
  labels: {}
  # Public UI URL (used in OIDC redirect, CORS). Defaults to https://<ingress.host>
  frontendUrl: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: true
  className: nginx
  host: treepage.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
  tls:
    enabled: true
    secretName: ""

postgresql:
  # Set host to your managed Postgres when enabled=false
  enabled: false
  host: postgres
  port: 5432
  database: treepage
  user: treepage
  sslMode: disable

secret:
  create: true
  existingSecret: ""
  dbPassword: changeme
  jwtSecret: changeme-generate-a-long-random-string
  oidcClientSecret: ""
  csrfSecret: changeme-generate-csrf-secret
  gitAccessToken: ""
  gitWebhookSecret: ""

auth:
  enabled: true
  replicas: 2
  image:
    repository: treepage/backend-auth
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    containerPort: 8081
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  readinessProbe:
    enabled: true
    path: /readiness
    port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    enabled: true
    path: /liveness
    port: 8081
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  oidc:
    enabled: true
    issuerUrl: https://keycloak.example.com/realms/treepage
    clientId: treepage
    scopes: openid profile email
  jwt:
    accessTtl: 15m
    refreshTtl: 168h
    issuer: treepage-auth
    audience: treepage
  logging:
    level: info
  security:
    rateLimitRps: 100

server:
  enabled: true
  replicas: 2
  image:
    repository: treepage/backend-server
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    containerPort: 8082
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  readinessProbe:
    enabled: true
    path: /readiness
    port: 8082
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    enabled: true
    path: /liveness
    port: 8082
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  jwt:
    issuer: treepage-auth
    audience: treepage
  logging:
    level: info
  security:
    rateLimitRps: 200
    enableAuditLog: true
  search:
    defaultLimit: 20
    maxLimit: 100
  extraEnv: []
  # Example LLM (OpenAI-compatible):
  # extraEnv:
  #   - name: LLM_ENABLED
  #     value: "true"
  #   - name: LLM_API_URL
  #     value: https://api.openai.com/v1
  #   - name: LLM_API_KEY
  #     valueFrom:
  #       secretKeyRef:
  #         name: treepage-llm
  #         key: api-key

sync:
  enabled: true
  replicas: 1
  image:
    repository: treepage/backend-sync
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    containerPort: 8083
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  readinessProbe:
    enabled: true
    path: /readiness
    port: 8083
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    enabled: true
    path: /liveness
    port: 8083
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  git:
    syncInterval: 300s
    workDir: /data/repos
  logging:
    level: info
  security:
    rateLimitRps: 50
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
    emptyDirSizeLimit: 2Gi
