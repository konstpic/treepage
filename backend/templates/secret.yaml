{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "treepage-backend.secretName" . }}
  labels:
    {{- include "treepage-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ required "secret.dbPassword is required when secret.create=true" .Values.secret.dbPassword | quote }}
  jwt-secret: {{ required "secret.jwtSecret is required when secret.create=true" .Values.secret.jwtSecret | quote }}
  oidc-client-secret: {{ .Values.secret.oidcClientSecret | default "" | quote }}
  csrf-secret: {{ .Values.secret.csrfSecret | default "" | quote }}
  git-access-token: {{ .Values.secret.gitAccessToken | default "" | quote }}
  git-webhook-secret: {{ .Values.secret.gitWebhookSecret | default "" | quote }}
{{- end }}
