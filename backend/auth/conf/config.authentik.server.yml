server:
  host: 0.0.0.0
  port: 8081

postgres:
  host: postgres
  port: 5432
  database: treepage
  user: treepage
  ssl_mode: disable

oidc:
  enabled: true
  issuer_url: http://192.168.0.64:9000/application/o/treepage/
  client_id: treepage
  client_secret: ""
  redirect_url: http://192.168.0.64:8090/api/auth/callback
  scopes: openid profile email roles groups
  role_claim: roles
  group_claim: groups
  sync_groups: true

jwt:
  access_ttl: 15m
  refresh_ttl: 168h
  issuer: treepage-auth
  audience: treepage

logging:
  level: info

security:
  rate_limit_rps: 100
  allowed_origins: http://192.168.0.64:8090

frontend:
  url: http://192.168.0.64:8090
