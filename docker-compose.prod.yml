name: treepage-prod

# Production-oriented compose. Requires .env.prod (see .env.prod.example).
# Static nginx frontend on :80, DEV_MODE off, no dev secret defaults in services.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: treepage
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: treepage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treepage"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend-auth:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.auth
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      ENV: prod
      DEV_MODE: "false"
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET required}
      REDIS_ADDR: redis:6379
    volumes:
      - ./backend/auth/conf/config.yml:/opt/app/conf/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  backend-server:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.server
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_ADDR: redis:6379
      SYNC_SERVICE_URL: http://backend-sync:8083
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN required}
      ATTACHMENTS_DIR: /data/attachments
      ATTACHMENTS_STORAGE: ${ATTACHMENTS_STORAGE:-local}
      MIGRATIONS_DIR: /app/migrations
      SEARCH_BACKEND: ${SEARCH_BACKEND:-postgres}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-false}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NOTIFY_SLACK_WEBHOOK_URL: ${NOTIFY_SLACK_WEBHOOK_URL:-}
      NOTIFY_SMTP_HOST: ${NOTIFY_SMTP_HOST:-}
      NOTIFY_SMTP_PORT: ${NOTIFY_SMTP_PORT:-587}
      NOTIFY_SMTP_FROM: ${NOTIFY_SMTP_FROM:-}
      NOTIFY_SMTP_USER: ${NOTIFY_SMTP_USER:-}
      NOTIFY_SMTP_PASSWORD: ${NOTIFY_SMTP_PASSWORD:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_USE_SSL: ${S3_USE_SSL:-false}
    volumes:
      - ./migrations:/app/migrations:ro
      - ./backend/server/conf/config.yml:/opt/app/conf/config.yml:ro
      - attachments_data:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 60s
    restart: unless-stopped

  backend-sync:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.sync
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_ADDR: redis:6379
      SERVER_SERVICE_URL: http://backend-server:8082
      GIT_ACCESS_TOKEN: ${GIT_ACCESS_TOKEN:-}
      GIT_WEBHOOK_SECRET: ${GIT_WEBHOOK_SECRET:?GIT_WEBHOOK_SECRET required}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    volumes:
      - ./backend/sync/conf/config.yml:/opt/app/conf/config.yml:ro
      - sync_repos:/tmp/treepage-repos
    depends_on:
      postgres:
        condition: service_healthy
      backend-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend-auth:
        condition: service_healthy
      backend-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  sync_repos:
  attachments_data:
