name: treepage

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: treepage
      POSTGRES_PASSWORD: treepage
      POSTGRES_DB: treepage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treepage"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-auth:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.auth
    ports:
      - "8081:8081"
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DEV_MODE: "true"
      ENV: dev
      DB_PASSWORD: treepage
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: dev-jwt-secret-change-in-production
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      CSRF_SECRET: dev-csrf-secret
      REDIS_ADDR: redis:6379
    volumes:
      - ./backend/auth/conf/config.yml:/opt/app/conf/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  backend-server:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8082:8082"
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DB_PASSWORD: treepage
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: dev-jwt-secret-change-in-production
      SYNC_SERVICE_URL: http://backend-sync:8083
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-in-production}
      ATTACHMENTS_DIR: /data/attachments
      # ATTACHMENTS_STORAGE: s3   # optional; requires S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY
      # NOTIFY_WEBHOOK_URL: https://hooks.example.com/treepage
      MIGRATIONS_DIR: /app/migrations
      SEARCH_BACKEND: ${SEARCH_BACKEND:-postgres}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      # Optional: LLM + embeddings for RAG (OpenAI-compatible chat + Ollama /api/embeddings)
      # LLM_ENABLED: "true"
      # LLM_API_URL: http://host.docker.internal:11434/v1
      # LLM_MODEL: llama3.2:latest
      # EMBEDDING_ENABLED: "true"
      # EMBEDDING_MODEL: nomic-embed-text
    volumes:
      - ./migrations:/app/migrations:ro
      - ./backend/server/conf/config.yml:/opt/app/conf/config.yml:ro
      - attachments_data:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s

  backend-sync:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.sync
    ports:
      - "8083:8083"
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DB_PASSWORD: treepage
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIT_ACCESS_TOKEN: ${GIT_ACCESS_TOKEN:-}
      GIT_WEBHOOK_SECRET: ${GIT_WEBHOOK_SECRET:-dev-webhook-secret}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-in-production}
    volumes:
      - ./backend/sync/conf/config.yml:/opt/app/conf/config.yml:ro
      - sync_repos:/tmp/treepage-repos
    depends_on:
      postgres:
        condition: service_healthy
      backend-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      # Same-origin: browser calls :5173/api/*, Vite proxies to backends (works on localhost and LAN IP)
      VITE_USE_PROXY: "true"
      VITE_PROXY_AUTH: http://backend-auth:8081
      VITE_PROXY_API: http://backend-server:8082
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend-auth:
        condition: service_healthy
      backend-server:
        condition: service_healthy

volumes:
  postgres_data:
  sync_repos:
  attachments_data:
