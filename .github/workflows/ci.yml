name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: |
          cd backend/pkg && go mod download
          cd ../auth && go mod download
          cd ../server && go mod download
          cd ../sync && go mod download

      - name: Build services
        run: |
          cd backend/auth && go build -o /dev/null ./cmd
          cd ../server && go build -o /dev/null ./cmd
          cd ../sync && go build -o /dev/null ./cmd

      - name: Vet
        run: |
          cd backend/pkg && go vet ./...
          cd ../auth && go vet ./...
          cd ../server && go vet ./...
          cd ../sync && go vet ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker compose -f docker-compose.yml config

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint backend chart
        run: helm lint backend --strict

      - name: Lint frontend chart
        run: helm lint .helm/frontend --strict

      - name: Lint umbrella chart
        run: |
          helm dependency update deploy/helm/treepage
          helm lint deploy/helm/treepage --strict
