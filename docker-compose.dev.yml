name: treepage

# Local / demo stack with static nginx frontend (same as dev server deploy).
# Copy docker-compose.dev.yml.example and set LLM_* / secrets in .env

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: treepage
      POSTGRES_PASSWORD: ${DB_PASSWORD:-treepage}
      POSTGRES_DB: treepage
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treepage"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-auth:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.auth
    ports:
      - "8081:8081"
    environment:
      CONFIG_PATH: ${AUTH_CONFIG_PATH:-/opt/app/conf/config.yml}
      DEV_MODE: ${DEV_MODE:-true}
      ENV: ${ENV:-dev}
      DB_PASSWORD: ${DB_PASSWORD:-treepage}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      CSRF_SECRET: ${CSRF_SECRET:-dev-csrf-secret}
      REDIS_ADDR: redis:6379
    volumes:
      - ./backend/auth/conf:/opt/app/conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  backend-server:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8082:8082"
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DB_PASSWORD: ${DB_PASSWORD:-treepage}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      REDIS_ADDR: redis:6379
      SYNC_SERVICE_URL: http://backend-sync:8083
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-in-production}
      ATTACHMENTS_DIR: /data/attachments
      MIGRATIONS_DIR: /app/migrations
      SEARCH_BACKEND: ${SEARCH_BACKEND:-postgres}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-false}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NOTIFY_SLACK_WEBHOOK_URL: ${NOTIFY_SLACK_WEBHOOK_URL:-}
    volumes:
      - ./migrations:/app/migrations:ro
      - ./backend/server/conf/config.yml:/opt/app/conf/config.yml:ro
      - attachments_data:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s

  backend-sync:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.sync
    ports:
      - "8083:8083"
    environment:
      CONFIG_PATH: /opt/app/conf/config.yml
      DB_PASSWORD: ${DB_PASSWORD:-treepage}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_ADDR: redis:6379
      SERVER_SERVICE_URL: http://backend-server:8082
      GIT_ACCESS_TOKEN: ${GIT_ACCESS_TOKEN:-}
      GIT_WEBHOOK_SECRET: ${GIT_WEBHOOK_SECRET:-dev-webhook-secret}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-in-production}
    volumes:
      - ./backend/sync/conf/config.yml:/opt/app/conf/config.yml:ro
      - sync_repos:/tmp/treepage-repos
    depends_on:
      postgres:
        condition: service_healthy
      backend-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend-auth:
        condition: service_healthy
      backend-server:
        condition: service_healthy

volumes:
  postgres_data:
  sync_repos:
  attachments_data:
